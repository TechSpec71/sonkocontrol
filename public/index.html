<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .gold-border { border-color: #FFD700; }
        .gold-text { color: #FFD700; }
        .gold-bg { background-color: #FFD700; }

        #map { height: 560px; width: 100%; border-radius: 12px; overflow: hidden; background: #111; }

        /* Vehicle markers — small "model car" chips on the map */
        .vehicle-marker {
            position: relative;
            width: 56px;
            height: 56px;
            cursor: pointer;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.7));
            transition: transform 0.25s ease;
        }
        .vehicle-marker:hover { transform: scale(1.12); }
        .vehicle-marker img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }
        .vehicle-marker .ground-shadow {
            position: absolute;
            left: 50%;
            bottom: -2px;
            transform: translateX(-50%);
            width: 32px;
            height: 7px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
        }
        .vehicle-marker .pulse-ring {
            position: absolute;
            left: 50%; bottom: -4px;
            transform: translateX(-50%);
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.7);
            box-shadow: 0 0 0 0 rgba(255,215,0,0.7);
            animation: pulse 2.2s infinite;
        }
        .vehicle-marker.red .pulse-ring { background: rgba(239, 68, 68, 0.7); box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
        .vehicle-marker.blue .pulse-ring { background: rgba(96, 165, 250, 0.7); box-shadow: 0 0 0 0 rgba(96,165,250,0.7); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 16px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* Leaflet popup tweaks */
        .leaflet-popup-content-wrapper {
            background: #161616;
            color: #e5e5e5;
            border: 1px solid #FFD700;
            border-radius: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 11px;
        }
        .leaflet-popup-content { margin: 8px 12px; }
        .leaflet-popup-tip { background: #FFD700; }
        .leaflet-control-zoom a { background: #161616 !important; color: #FFD700 !important; border-color: #333 !important; }
        .leaflet-control-attribution { background: rgba(15,15,15,0.7) !important; color: #888 !important; }
        .leaflet-control-attribution a { color: #FFD700 !important; }

        /* Sonko portrait chip */
        .sonko-chip {
            width: 44px; height: 44px;
            border-radius: 9999px;
            border: 2px solid #FFD700;
            background: #1a1a1a;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(255,215,0,0.35);
        }
        .sonko-chip img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center 20%;
        }

        .map-overlay {
            position: absolute;
            top: 12px; right: 12px;
            z-index: 500;
            background: rgba(15,15,15,0.78);
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 6px 10px;
            font-family: ui-monospace, monospace;
            font-size: 10px;
            color: #9ca3af;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            backdrop-filter: blur(6px);
            pointer-events: none;
        }
        .map-overlay .dot {
            display:inline-block; width:6px; height:6px; border-radius:50%;
            background:#22c55e; margin-right:6px; animation: blink 1.2s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body class="font-sans">

    <nav class="border-b border-gray-800 p-3 flex justify-between items-center bg-[#111]">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 gold-bg rounded-full flex items-center justify-center text-black font-bold">SRT</div>
            <h1 class="text-xl font-bold tracking-tighter gold-text">MHE. SONKO COMMAND</h1>
            <div class="sonko-chip" title="Mhe. Mike Sonko">
                <img src="img/sonko.png" alt="Mike Sonko" />
            </div>
        </div>
        <div class="hidden md:block text-xs font-mono text-gray-500 uppercase tracking-widest">
            System Status: <span class="text-green-500">Secure & Active</span>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-[#161616] p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-xs uppercase">Fleet Active</p>
                <p class="text-2xl font-bold gold-text">24 <span class="text-xs text-gray-400 font-normal">Vehicles</span></p>
            </div>
            <div class="bg-[#161616] p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-xs uppercase">Water Dispatched</p>
                <p class="text-2xl font-bold">180K <span class="text-xs text-gray-400 font-normal">Liters</span></p>
            </div>
            <div class="bg-[#161616] p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-xs uppercase">Rescue Alerts</p>
                <p class="text-2xl font-bold text-red-500">03</p>
            </div>
            <div class="bg-[#161616] p-4 rounded-lg border border-gray-800">
                <p class="text-gray-500 text-xs uppercase">Relief Cases</p>
                <p class="text-2xl font-bold text-blue-400">12</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-[#161616] p-4 rounded-xl border border-gray-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold uppercase tracking-widest">Live GPS Radar: Nairobi Aerial</h3>
                    <span class="text-[10px] bg-gray-800 px-2 py-1 rounded text-gray-400">ENCRYPTED STREAMING</span>
                </div>
                <div class="relative">
                    <div id="map"></div>
                    <div class="map-overlay"><span class="dot"></span>Aerial View · Nairobi & Environs</div>
                </div>
            </div>

            <div class="bg-[#161616] p-4 rounded-xl border border-gray-800">
                <h3 class="text-sm font-bold mb-4 uppercase gold-text">Active Operations</h3>
                <div id="ops-list" class="space-y-3"></div>
                <button class="w-full mt-8 py-3 gold-bg text-black font-black text-sm uppercase rounded shadow-2xl">
                    Push Daily Report to Mheshimiwa
                </button>
            </div>
        </div>
    </main>

    <!-- Details modal -->
    <div id="details-modal" class="fixed inset-0 z-[1000] hidden items-center justify-center p-4" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);">
        <div class="bg-[#161616] border border-yellow-500/50 rounded-xl max-w-md w-full p-6 shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <img id="modal-img" src="" class="w-14 h-14 object-contain" alt=""/>
                    <div>
                        <h3 id="modal-title" class="text-base font-bold gold-text uppercase tracking-wider"></h3>
                        <p id="modal-detail" class="text-xs text-gray-400 mt-1"></p>
                    </div>
                </div>
                <button id="modal-close" class="text-gray-400 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div class="border-t border-gray-800 pt-4">
                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-3">Team On Board</p>
                <ul id="modal-team" class="space-y-2 font-mono text-xs"></ul>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Plain aerial (satellite) map of Nairobi using Esri World Imagery tiles.
        const map = L.map('map', { zoomControl: true, attributionControl: true })
            .setView([-1.286389, 36.817223], 13);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri — Source: Esri, Maxar, Earthstar Geographics'
        }).addTo(map);

        // Optional thin street label overlay so users can read road names on the aerial view
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            opacity: 0.85,
            pane: 'overlayPane'
        }).addTo(map);

        // Build a Leaflet divIcon for each vehicle using its photo
        function vehicleIcon(imgSrc, color) {
            return L.divIcon({
                className: '',
                html: `<div class="vehicle-marker ${color}"><div class="pulse-ring"></div><div class="ground-shadow"></div><img src="${imgSrc}" /></div>`,
                iconSize: [56, 56],
                iconAnchor: [28, 50],
                popupAnchor: [0, -48]
            });
        }

        const vehicles = [
            {
                id: 'bowser-04',
                name: 'Water Bowser #4',
                img: 'img/bowser.png',
                color: 'gold',
                accent: 'border-yellow-500',
                detail: 'Mathare Area 4 — Offloading',
                speed: 0.005,
                team: [
                    { role: 'Driver',     name: 'Joseph Mwangi',      idNo: 'SRT-D-0418' },
                    { role: 'Co-Driver',  name: 'Hassan Abdi',        idNo: 'SRT-D-0420' },
                    { role: 'Field Lead', name: 'Grace Wambui',       idNo: 'SRT-F-0307' }
                ],
                path: [
                    [-1.2585, 36.8612],
                    [-1.2602, 36.8650],
                    [-1.2620, 36.8688],
                    [-1.2648, 36.8712],
                    [-1.2675, 36.8688],
                    [-1.2660, 36.8645],
                    [-1.2585, 36.8612]
                ]
            },
            {
                id: 'srt-01',
                name: 'Ambulance #SRT-01',
                img: 'img/ambulance.png',
                color: 'red',
                accent: 'border-red-500',
                detail: 'En Route: Upper Hill Office',
                speed: 0.010,
                team: [
                    { role: 'Paramedic',     name: 'Dr. Anne Kariuki',   idNo: 'SRT-M-0101' },
                    { role: 'EMT',           name: 'Brian Otieno',       idNo: 'SRT-M-0114' },
                    { role: 'Driver',        name: 'Peter Njoroge',      idNo: 'SRT-D-0205' }
                ],
                path: [
                    [-1.2980, 36.8112],
                    [-1.2960, 36.8155],
                    [-1.2935, 36.8195],
                    [-1.2900, 36.8210],
                    [-1.2872, 36.8175],
                    [-1.2895, 36.8130],
                    [-1.2980, 36.8112]
                ]
            },
            {
                id: 'raptor-12',
                name: 'Relief Truck #12',
                img: 'img/raptor.png',
                color: 'blue',
                accent: 'border-blue-500',
                detail: 'Isiolo Empowerment Drive — Loading',
                speed: 0.006,
                team: [
                    { role: 'Convoy Lead', name: 'Samuel Kiprono',  idNo: 'SRT-L-0033' },
                    { role: 'Driver',      name: 'Mohamed Ali',     idNo: 'SRT-D-0511' },
                    { role: 'Logistics',   name: 'Faith Akinyi',    idNo: 'SRT-L-0078' },
                    { role: 'Security',    name: 'Daniel Kimani',   idNo: 'SRT-S-0290' }
                ],
                path: [
                    [-1.2740, 36.8205],
                    [-1.2755, 36.8240],
                    [-1.2772, 36.8278],
                    [-1.2798, 36.8305],
                    [-1.2820, 36.8278],
                    [-1.2802, 36.8240],
                    [-1.2740, 36.8205]
                ]
            },
            {
                id: 'fire-07',
                name: 'Fire Engine #07',
                img: 'img/fireengine.png',
                color: 'red',
                accent: 'border-orange-500',
                detail: 'Industrial Area — Active Response',
                speed: 0.012,
                team: [
                    { role: 'Station Officer', name: 'Capt. James Wekesa', idNo: 'SRT-F-0901' },
                    { role: 'Driver',          name: 'Stephen Mutua',      idNo: 'SRT-D-0610' },
                    { role: 'Firefighter',     name: 'Naomi Chebet',       idNo: 'SRT-F-0915' },
                    { role: 'Firefighter',     name: 'Kevin Onyango',      idNo: 'SRT-F-0922' },
                    { role: 'Medic',           name: 'Aisha Mohamed',      idNo: 'SRT-M-0144' }
                ],
                path: [
                    [-1.3110, 36.8480],
                    [-1.3085, 36.8525],
                    [-1.3055, 36.8560],
                    [-1.3030, 36.8540],
                    [-1.3045, 36.8495],
                    [-1.3080, 36.8460],
                    [-1.3110, 36.8480]
                ]
            },
            {
                id: 'tow-03',
                name: 'Breakdown Truck #03',
                img: 'img/breakdown.png',
                color: 'gold',
                accent: 'border-amber-400',
                detail: 'Thika Road — Recovery in Progress',
                speed: 0.004,
                team: [
                    { role: 'Recovery Lead', name: 'Patrick Kamau',  idNo: 'SRT-R-0402' },
                    { role: 'Driver',        name: 'Eric Wanjala',   idNo: 'SRT-D-0712' },
                    { role: 'Mechanic',      name: 'Lucy Atieno',    idNo: 'SRT-M-0805' }
                ],
                path: [
                    [-1.2390, 36.8780],
                    [-1.2370, 36.8830],
                    [-1.2345, 36.8880],
                    [-1.2320, 36.8920],
                    [-1.2295, 36.8870],
                    [-1.2330, 36.8815],
                    [-1.2390, 36.8780]
                ]
            }
        ];

        // Build markers
        const markers = vehicles.map(v => {
            const m = L.marker(v.path[0], { icon: vehicleIcon(v.img, v.color) })
                .addTo(map)
                .bindPopup(`<div style="color:#FFD700;font-weight:700;letter-spacing:.08em">${v.name}</div><div style="color:#9ca3af;margin-top:2px">${v.detail}</div>`);
            return { v, marker: m, segment: 0, t: 0 };
        });

        // Helper map: vehicle id → tracked marker entry
        const markerById = Object.fromEntries(markers.map(m => [m.v.id, m]));

        // Render the Active Operations list dynamically so it stays in sync with the map data
        const opsList = document.getElementById('ops-list');
        opsList.innerHTML = vehicles.map(v => `
            <div class="border-l-2 ${v.accent} pl-3 py-2">
                <div class="flex items-center gap-3">
                    <img src="${v.img}" class="w-12 h-12 object-contain" alt="${v.name}"/>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold uppercase truncate">${v.name}</p>
                        <p class="text-[11px] text-gray-400 truncate">${v.detail}</p>
                    </div>
                </div>
                <div class="flex gap-2 mt-2 ml-[60px]">
                    <button data-locate="${v.id}" class="flex-1 text-[10px] font-bold uppercase tracking-wider px-2 py-1.5 rounded bg-yellow-500/15 text-yellow-400 border border-yellow-500/40 hover:bg-yellow-500 hover:text-black transition">
                        <i class="fa-solid fa-location-crosshairs mr-1"></i>Locate on Map
                    </button>
                    <button data-details="${v.id}" class="flex-1 text-[10px] font-bold uppercase tracking-wider px-2 py-1.5 rounded bg-gray-800 text-gray-300 border border-gray-700 hover:bg-gray-700 transition">
                        <i class="fa-solid fa-users mr-1"></i>Details
                    </button>
                </div>
            </div>
        `).join('');

        // Locate on Map: pan + zoom to the vehicle and open its popup
        opsList.addEventListener('click', e => {
            const locateBtn = e.target.closest('[data-locate]');
            const detailBtn = e.target.closest('[data-details]');
            if (locateBtn) {
                const entry = markerById[locateBtn.dataset.locate];
                if (!entry) return;
                const ll = entry.marker.getLatLng();
                map.flyTo(ll, 16, { duration: 1.2 });
                map.once('moveend', () => entry.marker.openPopup());
                // Brief flash so the user can see it once the camera lands
                setTimeout(() => {
                    const el = entry.marker.getElement();
                    if (!el) return;
                    el.animate(
                        [{ transform: 'scale(1)' }, { transform: 'scale(1.4)' }, { transform: 'scale(1)' }],
                        { duration: 700, iterations: 2 }
                    );
                }, 1300);
            } else if (detailBtn) {
                const v = vehicles.find(x => x.id === detailBtn.dataset.details);
                if (!v) return;
                document.getElementById('modal-img').src = v.img;
                document.getElementById('modal-title').textContent = v.name;
                document.getElementById('modal-detail').textContent = v.detail;
                document.getElementById('modal-team').innerHTML = v.team.map(t => `
                    <li class="flex items-center justify-between bg-[#0f0f0f] border border-gray-800 rounded px-3 py-2">
                        <div>
                            <div class="text-[10px] uppercase tracking-widest text-yellow-500">${t.role}</div>
                            <div class="text-gray-200">${t.name}</div>
                        </div>
                        <div class="text-[10px] text-gray-500 tracking-wider">${t.idNo}</div>
                    </li>
                `).join('');
                const modal = document.getElementById('details-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }
        });

        // Modal close handlers
        const modal = document.getElementById('details-modal');
        function closeModal() { modal.classList.add('hidden'); modal.classList.remove('flex'); }
        document.getElementById('modal-close').addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // Smoothly animate each marker along its loop
        function lerp(a, b, t) { return a + (b - a) * t; }
        function step() {
            markers.forEach(m => {
                const path = m.v.path;
                const a = path[m.segment];
                const b = path[(m.segment + 1) % path.length];
                const lat = lerp(a[0], b[0], m.t);
                const lng = lerp(a[1], b[1], m.t);
                m.marker.setLatLng([lat, lng]);
                m.t += (m.v.speed || 0.012);
                if (m.t >= 1) { m.t = 0; m.segment = (m.segment + 1) % path.length; }
            });
            requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    </script>
</body>
</html>
